<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>junyounge.com</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d0d0f;
      color: #f5f5f7;
    }
    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #22c55e;
      display: inline-block;
      margin-right: 8px;
      box-shadow: 0 0 12px #22c55e;
    }
    h1 { font-size: clamp(28px, 6vw, 48px); margin: 0 0 12px; letter-spacing: -0.02em; }
    p  { color: #a1a1aa; margin: 0; font-size: 16px; }
    code { color: #f5f5f7; background: #1c1c1f; padding: 2px 8px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1><span class="dot"></span>배포 성공</h1>
    <p><code>junyounge.com</code> 도메인이 정상적으로 연결됐어요.</p>
  </div>
</body>
</html>
